body:
  text: 縛日羅枳惹曩譯爾時如來在金剛頂瑜伽祕密宮殿中與微塵數諸大眾俱宣說微妙甚深祕密爾時會中有一菩薩摩訶薩名曰虗空神通王從座而起頂禮佛足白佛言世尊我於過去無量劫中供養諸佛修行最上祕密教法為五大牛玉雨寶陀羅尼是則一切諸佛世尊最深祕密微妙吉祥大寶庫藏為濁世眾生等在家出家貧窮困苦薄福之類資具乏少所求願事不隨其意令滿足一切所願欲說此法唯願世尊哀愍聽許爾時如來讚言善哉隨汝意說我於往昔無數劫前在因地時發大誓願力為諸眾生遍滿一切法界海中娑訶世界薄福下劣諸眾生等願作大水牛玉銀蹄金角青瑠璃色青大勢力周遍法界為諸眾生隨類應現作大饒益如汝今日發弘誓願汝欲說此雨寶陀羅尼者是則諸佛最上祕密牛玉寶印利益群生甚深祕術爾時祕大士虗空神通王菩薩蒙佛許可於如來前而說偈言我依諸佛最上乘祕密瑜伽名雨寶為像末法薄福是佛說成就甚深法若有眾生無福惠一切所欲不隨心由此貧苦造惡業墮在三途無出期依我所說祕密法修學雨寶陀羅尼免脫貧窮困苦難圓滿心中所求願若我弘誓大悲中一人不成二世願我墮虗妄罪苦中不還本覺捨大悲說此偈已即說呪法二手外縛二風竪相合蹙如寶形真言唵縛日羅怛羅莎呵又說根本陀羅尼金剛合掌唵半怛𠈺俐邪羅惹怛羅莎呵次說五大牛玉根本心印明先法界牛玉印金剛外縛中指如針真言唵縛日羅𮢥莎呵次金剛牛玉印明金剛外縛直立忍願偃仰進力如三股杵形真言唵縛日羅吽莎呵次寶光牛玉印金剛外縛立忍願進力如寶形真言唵縛日羅怛羅莎呵次蓮華牛玉印明金剛外縛進力如蓮華形真言曰唵縛日羅紇哩莎呵次羯磨牛玉印明金剛外縛立忍願面相合叉戒方進力立互相叉真言唵縛日羅惡莎呵次說修行方法若欲修行此最上法三業清淨親對善師受得儀軌先應灌頂或於山間靜處或於寺舍隨所樂處建立壇作一方壇隨其大小於壇面方安置尊像其形像法其身黃金色四臂一面頂戴五牛玉是五佛寶冠左手捧日輪右手捧月輪左手持如意寶形當心右手作施無畏印少許相去當在寶形持誦者壇東對像念誦以種種時華散壇上燒香燈明飯食菓子隨力所辨以為供養每入道場對尊像五體投地禮一切佛及諸聖眾即懺悔隨喜勸請發願已然後結跏趺坐或半跏趺隨意而坐端身正念常以塗香用塗兩手虗心合掌而誦淨三業真言唵舜入第耨戍引駄曩引耶莎呵次佛部心印明金剛合掌真言唵爾曩爾伽莎呵次蓮華部心印明金合唵阿嚧力迦莎呵次金剛部心印金合唵縛日羅地力迦莎呵次被甲護身印明左右各作金剛拳左拳安左腰以右拳印五處仍印額右肩左肩心喉真言唵步引入縛二合羅吽次召請本尊印明二手內縛舒右風少屈如鈎形召之三遍真言曰唵𮢥吽怛羅二合訖里二合惡曳醯呬莎呵次軍吒利身印明二手內縛竪忍願頭相柱舒進力以屈當忍願背不相著作三股杵形真言曰唵阿密哩二合帝吽發吒莎呵次獻閼伽水印壇上左右各置一淨器滿盛香水以為閼伽初迎請時獻右邊者後奉送時獻左邊者奉獻時二羽捧閼伽器當額即誦真言浴本尊足真言唵縛日羅那迦吒吽次獻華座印二手虗心合掌作開敷蓮華八葉印當額明曰唵迦摩羅莎呵次普通供養印二雙合掌以戒方二度外縛以進力反蹙如寶形結印已成誦真言曰唵誐誐曩三引婆嚩縛日羅斛想從印出生無量種種供具香華燈明塗香飲食寶幢幡蓋一切寶物奉供養本尊一切聖眾次結金剛合掌印即誦大牛玉菩薩讚歎曰縛日羅二合羅怛曩二合素縛日羅二合羅他縛日羅二合迦捨摩訶摩抳阿引迦引捨蘖婆縛日羅荼縛日羅蘖婆曩謨率都帝次羯磨印左拳印當心空風相捻如寶形右手作施願勢觀想我身即同五大牛玉菩薩真言唵𮢥吽怛羅紇哩惡憾莎呵次結三昧耶印二雙外縛進力反蹙如寶形禪智並竪置於心上真言唵縛日羅二合羅怛曩吽即取水精念珠安於掌中當心誦加持念珠真言三遍真言曰唵尾盧引石曩摩羅莎呵然後發願始自我身一切有情所希望事世間一切善願以我念誦力速令成就而下心上念誦誦此真言於七日中滿三十萬遍聖者即現持誦者前隨心所求皆得成就若常持誦每日三時時別念誦一千八十遍數滿一百萬遍一切求願莫不成就念誦分限畢頂戴念珠祈請所求即安本處次奉送本尊印明二手外縛竪二大指頭插華誦真言想念本尊送本土真言曰唵縛日羅怛曩黎次三部被甲如前我依如來加持力說此甚深微妙法若於像末不信人不同其不莫授與先擇弟子其心操人所敬有智惠修四無量樂大乘敬禮三寶兼濟心從師入壇已灌頂既蒙印可而修行自恣杖罔此深法金剛薩埵冥治罸孝養父母不懈怠恭敬尊重阿闍梨誠心信受此大法不生一念不信心傳受已後專修此誠心祈請所求願本尊哀愍垂加護悉地現前令滿足若有來求無厭心隨力所堪而施與於傳受阿闍梨耶奉獻珍寶不惜身命若有慳不行從此法悉地不圓滿忽忌宣傳於世間毀謗罪故墮惡趣由此印契祕密故六根罪障悉清淨福智圓滿具大行必證無上大菩提慈智上人黑谷示之此法極密故絕不流行而慈覺大師在虗時為令此法令斷絕雖傳受之深隱心腑不敢披露俱能知彼器可傳受之云云出自如意輪法中文保三年正月三日以不退寺入真房本於東南院院主坊書寫之了莫出竹木目底金剛資賴心三十七二十二
